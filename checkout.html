<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout | Maison Aurelia</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Italiana&display=swap"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head><body><header class="site-header"><div class="container site-header__inner"><a class="brand" href="index.html"><span class="brand__mark">MA</span><span class="brand__name">Maison Aurelia</span></a><span>Secure checkout</span></div></header><main><section class="page-hero"><div class="container"><p class="eyebrow">Final step</p><h1>Checkout</h1></div></section><div class="container two-column" data-checkout-layout><form class="panel" data-checkout-form><h2>Shipping address</h2><div class="form-grid"><div class="form-group"><label for="firstName">First name</label><input class="form-control" id="firstName" name="firstName" required></div><div class="form-group"><label for="lastName">Last name</label><input class="form-control" id="lastName" name="lastName" required></div><div class="form-group form-group--full"><label for="email">Email</label><input class="form-control" id="email" name="email" type="email" required></div><div class="form-group form-group--full"><label for="address">Address</label><input class="form-control" id="address" name="address" required></div><div class="form-group"><label for="city">City</label><input class="form-control" id="city" name="city" required></div><div class="form-group"><label for="postal">Postal code</label><input class="form-control" id="postal" name="postal" required></div><div class="form-group"><label for="country">Country</label><input class="form-control" id="country" name="country" required></div><div class="form-group"><label for="phone">Phone</label><input class="form-control" id="phone" name="phone" type="tel"></div></div><h2>Billing address</h2><label class="choice-card"><input type="checkbox" name="billingSame" checked> Same as shipping address</label><h2>Payment method</h2><label class="choice-card"><input type="radio" name="payment" value="card" checked> Credit or debit card (demonstration)</label><label class="choice-card"><input type="radio" name="payment" value="paypal"> PayPal</label><div class="form-grid"><div class="form-group form-group--full"><label for="card">Card number</label><input class="form-control" id="card" inputmode="numeric" placeholder="4242 4242 4242 4242"></div></div><button class="button button--block" type="submit">Place order</button></form><aside class="panel"><h2>Order summary</h2><div data-checkout-summary></div><p><small>This is a front-end demonstration. No payment will be processed.</small></p></aside></div></main><script src="js/storage.js"></script><script src="js/theme.js"></script><script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/app.js"></script><script src="js/page.js"></script></body></html>
