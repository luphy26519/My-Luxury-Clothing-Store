<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard | Maison Aurelia</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Italiana&display=swap"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/admin.css"></head><body><div class="admin-shell"><aside class="admin-sidebar"><a class="brand" href="index.html"><span class="brand__mark">MA</span><span>Maison Aurelia</span></a><nav aria-label="Admin"><a class="is-active" href="admin.html">Dashboard</a><a href="add-product.html">Add product</a><a href="settings.html">Settings</a><a href="shop.html">View store</a></nav></aside><main class="admin-main"><header class="admin-topbar"><div><p class="eyebrow">Store management</p><h1>Dashboard</h1></div><a class="button" href="add-product.html">Add product</a></header><section class="stat-grid" aria-label="Store statistics"><article class="stat-card"><span>Total products</span><strong data-stat-products>0</strong></article><article class="stat-card"><span>Units in stock</span><strong data-stat-stock>0</strong></article><article class="stat-card"><span>Featured pieces</span><strong data-stat-featured>0</strong></article><article class="stat-card"><span>Inventory value</span><strong data-stat-value>$0</strong></article></section><section><div class="section-heading"><div><p class="eyebrow">Catalogue</p><h2>Product list</h2></div><input class="form-control" data-admin-search type="search" placeholder="Search products" aria-label="Search products"></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead><tbody data-admin-products></tbody></table></div></section></main></div><div class="modal" data-delete-modal role="dialog" aria-modal="true" aria-labelledby="delete-title"><div class="modal__
