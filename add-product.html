<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Product | Maison Aurelia</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Italiana&display=swap"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/admin.css"></head><body><main class="container section"><div class="section-heading"><div><p class="eyebrow">Catalogue editor</p><h1 data-form-title>Add product</h1></div><a class="arrow-link" href="admin.html">← Dashboard</a></div><form class="panel" data-product-form><div class="form-grid"><div class="form-group form-group--full"><label for="name">Product name</label><input class="form-control" id="name" name="name" required></div><div class="form-group"><label for="price">Price (USD)</label><input class="form-control" id="price" name="price" type="number" min="0" step="1" required></div><div class="form-group"><label for="stock">Stock</label><input class="form-control" id="stock" name="stock" type="number" min="0" required></div><div class="form-group"><label for="category">Category</label><input class="form-control" id="category" name="category" required placeholder="Women, Men, Accessories…"></div><div class="form-group"><label for="badge">Badge</label><input class="form-control" id="badge" name="badge" placeholder="New, Exclusive…"></div><div class="form-group form-group--full"><label for="description">Description</label><textarea class="form-control" id="description" name="description" rows="5" required></textarea></div><div class="form-group"><label for="sizes">Sizes (comma-separated)</label><input class="form-control" id="sizes" name="sizes" required placeholder="XS, S, M, L"></div><div class="form-group"><label for="colors">Colors (comma-separated)</label><input class="form-control" id="colors" name="colors" required placeholder="Black, Ivory"></div><div class="form-group form-group--full"><label for="tags">Tags (comma-separated)</label><input class="form-control" id="tags" name="tags" placeholder="tailoring, wool, new"></div><div class="form-group form-group--full"><label for="imageFiles">Product images</label><input class="form-control" id="imageFiles" name="imageFiles" type="file" accept="image/*" multiple><small>Selected local images are previewed immediately and stored as data URLs.</small><div class="image-preview-grid" data-image-preview></div></div><label class="choice-card"><input type="checkbox" name="featured"> Featured product</label><label class="choice-card"><input type="checkbox" name="bestSelling"> Best selling</label></div><div class="form-actions"><button class="button" type="submit">Save product</button><a class="button button--outline" href="admin.html">Cancel</a></div></form></main><script src="js/storage.js"></script><script src="js/theme.js"></script><script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/app.js"></script><script src="js/admin.js"></script></body></html>
