<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings | Maison Aurelia</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Italiana&display=swap"><link rel="stylesheet" href="css/style.css"></head><body><main class="container section"><div class="section-heading"><div><p class="eyebrow">Preferences</p><h1>Store settings</h1></div><a class="arrow-link" href="admin.html">← Dashboard</a></div><form class="panel" data-settings-form><div class="form-grid"><div class="form-group"><label for="storeName">Store name</label><input class="form-control" id="storeName" name="storeName" value="Maison Aurelia"></div><div class="form-group"><label for="currency">Currency</label><select class="form-control" id="currency" name="currency"><option>USD</option><option>EUR</option><option>JPY</option></select></div><div class="form-group form-group--full"><label for="announcement">Announcement text</label><input class="form-control" id="announcement" name="announcement" value="Complimentary worldwide delivery on orders over $500"></div></div><div class="form-actions"><button class="button">Save settings</button><button class="button button--outline" type="button" data-theme-toggle>Toggle light / dark theme</button></div></form><section class="panel" style="margin-top:2rem"><h2>Catalogue data</h2><p>Restore the original sample catalogue. Your cart and wishlist remain untouched.</p><button class="button button--danger" type="button" data-reset-products>Restore sample products</button></section></main><script src="js/storage.js"></script><script src="js/theme.js"></script><script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/app.js"></script><script src="js/page.js"></script></body></html>
